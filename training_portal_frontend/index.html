<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENRIXA - Training Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #ff1493;
            --dark-bg: #0a0e27;
            --dark-secondary: #1a1f3a;
            --text: #ffffff;
            --text-secondary: #b0b0b0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4); }
            50% { box-shadow: 0 10px 40px rgba(255, 20, 147, 0.8); }
            100% { box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4); }
        }

        body {
            font-family: 'Outfit', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #1a0f2e, var(--dark-bg));
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        .logo {
            font-size: 5rem;
            margin-bottom: 20px;
            display: inline-block;
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px var(--accent));
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -2px;
            background: linear-gradient(to right, #fff, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.4rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .feature {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: fadeInUp 0.6s forwards;
        }

        .feature:nth-child(1) { animation-delay: 0.3s; }
        .feature:nth-child(2) { animation-delay: 0.5s; }
        .feature:nth-child(3) { animation-delay: 0.7s; }

        .feature:hover {
            transform: translateY(-12px) scale(1.05);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .feature i {
            font-size: 2.5rem;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .feature h3 {
            margin-bottom: 12px;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .cta-btn {
            background: linear-gradient(135deg, var(--accent) 0%, #764ba2 100%);
            color: white;
            padding: 20px 80px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            animation: pulseGlow 3s infinite;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cta-btn:hover {
            transform: scale(1.05) translateY(-2px);
            filter: brightness(1.1);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container" id="landingPage">
        <div class="logo">🔐</div>
        <h1>CENRIXA</h1>
        <p>Training Management System</p>
        <p style="font-size: 1rem; color: var(--text-secondary);">Centralizing Access, Roles, and Workflow</p>

        <div class="features">
            <div class="feature">
                <i class="fas fa-lock"></i>
                <h3>Secure Authentication</h3>
                <p style="font-size: 0.9rem; margin: 0;">Enterprise-grade OAuth2</p>
            </div>
            <div class="feature">
                <i class="fas fa-users"></i>
                <h3>Role Management</h3>
                <p style="font-size: 0.9rem; margin: 0;">Admin, Manager, Trainee</p>
            </div>
            <div class="feature">
                <i class="fas fa-tasks"></i>
                <h3>Task Workflows</h3>
                <p style="font-size: 0.9rem; margin: 0;">Create & manage tasks</p>
            </div>
        </div>

        <button class="cta-btn" onclick="login()">Login</button>
    </div>

    <div class="loading" id="loadingPage">
        <h2>Loading Dashboard...</h2>
        <div class="spinner"></div>
        <p style="color: var(--text-secondary); margin-top: 20px;">Redirecting you to your dashboard</p>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000';
        const TOKEN_KEY = 'cenrixa_token';

        // Initialize on page load
        window.addEventListener('load', init);

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            
            // 1. If we just came back from Keycloak with a code
            if (code) {
                try {
                    showLoading(true);
                    // Remove code from URL for cleanliness
                    window.history.replaceState({}, document.title, window.location.pathname);
                    
                    const token = await exchangeCodeForToken(code);
                    await redirectToDashboard(token);
                } catch (error) {
                    console.error('Auth error:', error);
                    showLoading(false);
                    alert('Authentication failed: ' + error.message);
                }
                return;
            }

            // 2. Auto-login disabled at user request.
            // Users must always click 'Login' to proceed.
        }

        // Exchange Authorization Code for JWT via Backend
        async function exchangeCodeForToken(code) {
            const redirectUri = window.location.origin + window.location.pathname;
            const response = await fetch(`${API_BASE_URL}/api/v1/auth/exchange`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    code: code,
                    redirect_uri: redirectUri
                })
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.detail || 'Failed to exchange token');
            }

            const result = await response.json();
            return result.data.access_token;
        }

        // Handle login click
        function login() {
            // Redirect to Keycloak with response_type=code and prompt=login
            const kcLoginUrl = 'http://localhost:8080/realms/training-portal/protocol/openid-connect/auth';
            const clientId = 'fastapi-backend';
            const redirectUri = encodeURIComponent(window.location.origin + window.location.pathname);
            
            // prompt=login ensures the user is asked for credentials every time
            window.location.href = `${kcLoginUrl}?client_id=${clientId}&response_type=code&redirect_uri=${redirectUri}&scope=openid&prompt=login`;
        }

        // Redirect to correct dashboard based on role
        async function redirectToDashboard(token) {
            try {
                // Get user info from backend
                const response = await fetch(`${API_BASE_URL}/api/v1/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    throw new Error('Could not retrieve user profile');
                }

                const data = await response.json();
                const user = data.user;

                // Store token
                localStorage.setItem(TOKEN_KEY, token);

                // Determine dashboard based on role
                let dashboardFile = null;

                const userRoles = user.roles || [];
                const userRolesLower = userRoles.map(r => r.toLowerCase());

                if (userRolesLower.includes('admin') || userRolesLower.includes('portal admin')) {
                    dashboardFile = 'admin.html';
                } else if (userRolesLower.includes('manager')) {
                    dashboardFile = 'manager.html';
                } else if (userRolesLower.includes('trainee')) {
                    dashboardFile = 'trainee.html';
                }

                // Redirect to dashboard or show pending message
                if (dashboardFile) {
                    window.location.href = dashboardFile + '?token=' + token;
                } else {
                    // Show "Awaiting Approval" message on the landing page
                    showLoading(false);
                    const hero = document.querySelector('.hero');
                    if (hero) {
                        const statusBanner = document.createElement('div');
                        statusBanner.style.cssText = 'background:#ffc107; color:#000; padding:15px; border-radius:8px; margin-top:20px; font-weight:bold; width:100%; max-width:600px;';
                        statusBanner.innerHTML = '<i class="fas fa-clock"></i> Registration Successful! Your account is currently awaiting Admin approval. Please check back later.';
                        hero.appendChild(statusBanner);
                    }
                }

            } catch (error) {
                console.error('Dashboard redirect error:', error);
                throw error;
            }
        }

        // Show/hide loading
        function showLoading(show) {
            if (show) {
                document.getElementById('landingPage').style.display = 'none';
                document.getElementById('loadingPage').classList.add('active');
            } else {
                document.getElementById('landingPage').style.display = 'block';
                document.getElementById('loadingPage').classList.remove('active');
            }
        }

        // Logout function
        function logout() {
            localStorage.removeItem(TOKEN_KEY);
            window.location.href = '/';
        }
    </script>
</body>

</html>
